{% load static %}

<div class="u-s-p-b-60">
  <!--====== Section Intro ======-->
  <div class="section__intro u-s-m-b-46">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="section__text-wrap">
            <h1 class="section__heading u-c-secondary u-s-m-b-12">NEW ARRIVALS</h1>
            <span class="section__span u-c-silver">GET UP FOR NEW ARRIVALS</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!--====== End - Section Intro ======-->

  <!--====== Section Content ======-->
  <div class="section__content">
    <div class="container">
      <div class="slider-fouc">
        <div class="owl-carousel product-slider" data-item="4">
          {% for new_product in products_new_arrival %}

          <div class="u-s-m-b-30">
            <div class="product-o product-o--hover-on">
              <div class="product-o__wrap">
                <a class="aspect aspect--bg-grey aspect--square u-d-block"
                  href="{% url 'products:product_detail' new_product.slug %}">
                  <img class="aspect__img" src="{{ new_product.image_url }}" alt="">
                </a>
                <div class="product-o__action-wrap">
                  <ul class="product-o__action-list">
                    <li>
                      <a class="quickview" data-url="{% url 'products:product-quick-view' new_product.id %}"
                        data-modal="modal" data-modal-id="#quick-look" data-tooltip="tooltip" data-placement="top"
                        title="Quick View"><i class="fas fa-search-plus"></i></a>
                    </li>
                    <li>
                      <a data-modal="modal" data-modal-id="#add-to-cart" data-tooltip="tooltip" data-placement="top"
                        title="Add to Cart"><i class="fas fa-plus-circle"></i></a>
                    </li>
                    <li>
                      <a href="signin.html" data-tooltip="tooltip" data-placement="top" title="Add to Wishlist"><i
                          class="fas fa-heart"></i></a>
                    </li>
                    <li>
                      <a href="signin.html" data-tooltip="tooltip" data-placement="top"
                        title="Email me When the price drops"><i class="fas fa-envelope"></i></a>
                    </li>
                  </ul>
                </div>
              </div>
              <span class="product-o__category">
                <a href="shop-side-version-2.html">{{ new_product.get_cat_list.0 }}</a></span>
              <span class="product-o__name">
                <a href="{% url 'products:product_detail' new_product.slug %}">
                  {{ new_product.title|truncatechars:25 }}
                </a>
              </span>
              <div class="product-o__rating gl-rating-style"><i class="far fa-star"></i><i class="far fa-star"></i><i
                  class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
                <span class="product-o__review">(0)</span>
              </div>
              <span class="product-o__price">
                ${{ new_product.price }}
                {% if new_product.sale_price %}
                <span class="product-o__discount">${{ new_product.sale_price }}</span>
                {% endif %}
              </span>
            </div>
          </div>

          {% endfor %}

        </div>
      </div>
    </div>
  </div>
  <!--====== End - Section Content ======-->
</div>
